<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Michael's Prototype - High-Density Weather</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.98);
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
            --down: #ff3333;
            --up: #00ff88;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: brightness(0.15) blur(30px);
            background-size: cover; background-position: center;
            transition: background 3s ease-in-out;
        }

        .master-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR - HIGH DENSITY */
        .sidebar {
            width: 28%; background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 40px 25px;
            box-sizing: border-box; box-shadow: 20px 0 50px rgba(0,0,0,1);
        }

        #clock { font-size: 5vw; font-weight: 900; letter-spacing: -3px; line-height: 1; margin: 0; }
        #date { font-size: 0.9vw; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        
        .weather-console { border-top: 1px solid var(--border); padding-top: 25px; margin-top: auto; }
        #side-temp { font-size: 6vw; font-weight: 800; margin: 0; line-height: 1; color: #fff; }
        
        .met-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .met-item { display: flex; flex-direction: column; }
        .met-label { font-size: 0.7vw; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .met-val { font-size: 1.3vw; font-weight: 600; color: #eee; }

        /* CONTENT AREA */
        .content-area { width: 72%; position: relative; padding: 60px; box-sizing: border-box; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; }
        .active { display: flex; animation: slideUp 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* STYLES */
        .market-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border); border-radius: 15px;
            padding: 30px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-card { background: var(--glass); border-bottom: 1px solid var(--border); padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 90%; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="master-container">
        <div class="sidebar">
            <div id="clock">00:00</div>
            <div id="date">MARCH 5, 2026</div>
            
            <div class="weather-console">
                <div id="side-temp">--°</div>
                <div id="side-condition" style="color:var(--accent); font-size: 1vw; margin-bottom: 15px;">STATION: KINRUSHV6</div>
                
                <div class="met-grid">
                    <div class="met-item"><span class="met-label">Wind</span><span id="val-wind" class="met-val">-- MPH</span></div>
                    <div class="met-item"><span class="met-label">Direction</span><span id="val-dir" class="met-val">--</span></div>
                    <div class="met-item"><span class="met-label">Humidity</span><span id="val-hum" class="met-val">--%</span></div>
                    <div class="met-item"><span class="met-label">Dew Point</span><span id="val-dew" class="met-val">--°</span></div>
                    <div class="met-item" style="grid-column: span 2;"><span class="met-label">Barometer</span><span id="val-press" class="met-val">-- IN</span></div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div id="page-0" class="page active">
                <div style="border-left: 8px solid var(--accent); padding-left: 30px;">
                    <div style="font-size: 1.2vw; color: #888; letter-spacing: 5px;">PROTOTYPE</div>
                    <div style="font-size: 5vw; font-weight: 800;">WEATHER<br><span style="color:var(--accent)">PANEL</span></div>
                </div>
            </div>

            <div id="page-1" class="page">
                <div style="font-size: 1.2vw; color: var(--accent); margin-bottom: 20px;">NCAA MEN'S BASKETBALL</div>
                <div id="sports-list"></div>
            </div>

            <div id="page-2" class="page">
                <div style="font-size: 1.2vw; color: var(--accent); margin-bottom: 20px;">MARKET SUMMARY</div>
                <div class="market-card">
                    <div><span style="color:var(--accent); text-transform:uppercase; font-size:0.9vw;">Dow Jones</span><br><span style="font-size:3vw; font-weight:800;">47,954.74</span></div>
                    <div style="color:var(--down); text-align:right; font-size:2vw; font-weight:700;">▼ 784.67<br><small style="font-size:1vw;">-1.61%</small></div>
                </div>
                <div class="market-card">
                    <div><span style="color:var(--accent); text-transform:uppercase; font-size:0.9vw;">S&P 500</span><br><span style="font-size:3vw; font-weight:800;">6,830.71</span></div>
                    <div style="color:var(--down); text-align:right; font-size:2vw; font-weight:700;">▼ 38.79<br><small style="font-size:1vw;">-0.56%</small></div>
                </div>
            </div>

            <div id="page-3" class="page">
                <iframe src="https://www.wunderground.com"></iframe>
            </div>
        </div>
    </div>

    <script>
        const WU_KEY = 'c81a6f3f2fe543bd9a6f3f2fe583bde7';
        const WU_ID = 'KINRUSHV6';
        let idx = 0;

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.weather.com{WU_ID}&format=json&units=e&apiKey=${WU_KEY}`);
                const data = await res.json();
                const obs = data.observations[0].imperial;
                
                document.getElementById('side-temp').innerText = Math.round(obs.temp) + "°";
                document.getElementById('val-wind').innerText = Math.round(obs.windSpeed) + " MPH";
                document.getElementById('val-dir').innerText = getCardinal(data.observations[0].winddir);
                document.getElementById('val-hum').innerText = data.observations[0].humidity + "%";
                document.getElementById('val-dew').innerText = Math.round(obs.dewpt) + "°";
                document.getElementById('val-press').innerText = obs.pressure + " IN";
            } catch(e) { console.error("Weather Fail"); }
        }

        function getCardinal(angle) {
            const directions = ['N', 'NE', 'E', 'SE', 'S', (angle > 202 && angle < 247 ? 'SW' : 'SW'), 'W', 'NW'];
            return directions[Math.round(angle / 45) % 8];
        }

        async function updateSports() {
            try {
                const res = await fetch(`https://api.allorigins.win{encodeURIComponent('https://site.api.espn.com')}`);
                const raw = await res.json();
                const data = JSON.parse(raw.contents);
                let html = "";
                data.events.slice(0, 4).forEach(e => {
                    const teams = e.competitions[0].competitors;
                    const home = teams.find(t => t.homeAway === 'home');
                    const away = teams.find(t => t.homeAway === 'away');
                    html += `<div class="score-card">
                        <div style="font-size: 1.8vw; font-weight: 700;">${away.team.abbreviation} @ ${home.team.abbreviation}</div>
                        <div style="text-align:right">
                            <div style="font-size: 2vw; font-weight: 800; color: var(--accent);">${away.score} - ${home.score}</div>
                            <div style="font-size: 0.8vw; color: #888;">${e.status.type.shortDetail}</div>
                        </div>
                    </div>`;
                });
                document.getElementById('sports-list').innerHTML = html;
            } catch(e) {}
        }

        function rotate() {
            document.getElementById(`page-${idx}`).classList.remove('active');
            idx = (idx + 1) % 4;
            document.getElementById(`page-${idx}`).classList.add('active');
            document.getElementById('bg-layer').style.backgroundImage = `url('https://picsum.photos{Math.random()}')`;
        }

        setInterval(rotate, 8000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).replace(/ AM| PM/, "");
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
        }, 1000);

        updateWeather(); updateSports();
        setInterval(updateWeather, 60000);
        setInterval(updateSports, 60000);
        document.getElementById('bg-layer').style.backgroundImage = "url('https://picsum.photos')";
    </script>
</body>
</html>
