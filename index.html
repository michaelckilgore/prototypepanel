<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Media Panel Dashboard</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:opacity 1s;
}

.screen.active{
opacity:1;
}

.title{
position:absolute;
top:20px;
font-size:40px;
font-weight:bold;
}

.bigtemp{
font-size:120px;
font-weight:bold;
}

.row{
display:flex;
gap:60px;
margin-top:40px;
font-size:30px;
}

.ticker{
position:absolute;
bottom:0;
width:100%;
background:#111;
padding:10px;
font-size:22px;
}

iframe{
border:none;
}

</style>
</head>

<body>

<!-- WEATHER SCREEN -->

<div class="screen active" id="weather">

<div class="title">Rushville Weather</div>

<div class="bigtemp" id="temp">--°</div>

<div class="row">

<div>Humidity<br><span id="humidity">--</span>%</div>

<div>Wind<br><span id="wind">--</span> mph</div>

<div>Pressure<br><span id="pressure">--</span></div>

</div>

</div>

<!-- RADAR -->

<div class="screen" id="radar">

<div class="title">Live Radar</div>

<iframe width="90%" height="80%"
src="https://embed.windy.com/embed2.html?lat=39.60&lon=-85.44&zoom=7&level=surface&overlay=radar&menu=&message=&marker=&calendar=&pressure=&type=map&location=coordinates">
</iframe>

</div>

<!-- SPORTS -->

<div class="screen" id="sports">

<div class="title">College Basketball Tonight</div>

<div id="sportsGames" style="font-size:30px"></div>

</div>

<!-- STOCKS -->

<div class="screen" id="stocks">

<div class="title">Market Watch</div>

<div class="row">

<div>DJIA<br><span id="djia">--</span></div>

<div>S&P 500<br><span id="sp500">--</span></div>

<div>NASDAQ<br><span id="nasdaq">--</span></div>

</div>

</div>

<!-- WEATHER GRAPHS -->

<div class="screen" id="graphs">

<div class="title">Station Trends</div>

<iframe width="90%" height="80%"
src="https://www.wunderground.com/dashboard/pws/KINRUSHV6">
</iframe>

</div>

<div class="ticker" id="ticker">
Loading data...
</div>

<script>

const apiKey = "c81a6f3f2fe543bd9a6f3f2fe583bde7"
const stationID = "KINRUSHV6"

async function getWeather(){

let url = `https://api.weather.com/v2/pws/observations/current?stationId=${stationID}&format=json&units=e&apiKey=${apiKey}`

let r = await fetch(url)
let data = await r.json()

let obs = data.observations[0]

document.getElementById("temp").innerText = Math.round(obs.imperial.temp)+"°"

document.getElementById("humidity").innerText = obs.humidity

document.getElementById("wind").innerText = Math.round(obs.imperial.windSpeed)

document.getElementById("pressure").innerText = obs.imperial.pressure

document.getElementById("ticker").innerText =
`Temp ${obs.imperial.temp}° | Humidity ${obs.humidity}% | Wind ${obs.imperial.windSpeed} mph`

}

getWeather()

setInterval(getWeather,60000)

</script>

<script>

let screens = document.querySelectorAll(".screen")

let current = 0

function rotateScreens(){

screens.forEach(s=>s.classList.remove("active"))

screens[current].classList.add("active")

current++

if(current>=screens.length){
current=0
}

}

setInterval(rotateScreens,3000)

</script>

<script>

setInterval(()=>{

let x=Math.floor(Math.random()*8)-4
let y=Math.floor(Math.random()*8)-4

document.body.style.transform=`translate(${x}px,${y}px)`

},180000)

</script>

</body>
</html>
