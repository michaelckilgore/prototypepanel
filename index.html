<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Michael's Prototype - Rushville Broadcast</title>
    <style>
        :root {
            --panel-bg: rgba(20, 20, 25, 0.9);
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --down: #ff4b4b;
            --up: #00ff88;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050505; color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* DYNAMIC BACKGROUND (Darkened/Blurred) */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: brightness(0.25) blur(15px);
            background-size: cover; background-position: center;
            transition: background 2s ease-in-out;
        }

        .master-container { display: flex; height: 100vh; width: 100vw; }

        /* BROADCAST SIDEBAR */
        .sidebar {
            width: 25%; background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 40px;
            backdrop-filter: blur(20px); box-sizing: border-box;
        }

        #clock { font-size: 5vw; font-weight: 800; letter-spacing: -2px; margin: 0; }
        #date { font-size: 1.1vw; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        
        .sidebar-weather { border-top: 1px solid var(--border); padding-top: 30px; margin-top: auto; }
        .sidebar-label { font-size: 0.9vw; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        #side-temp { font-size: 4vw; font-weight: 700; margin: 0; }

        /* CONTENT AREA */
        .content-area { width: 75%; position: relative; padding: 60px; box-sizing: border-box; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; animation: fadeIn 0.8s ease; justify-content: center; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MICHAEL'S SPLASH */
        .title-text { font-size: 4.5vw; font-weight: 200; letter-spacing: 5px; text-transform: uppercase; text-align: center; border: 1px solid var(--border); padding: 50px; border-radius: 25px; background: var(--glass); backdrop-filter: blur(10px); }

        /* GLASSMORPHISM CARDS (STOCKS & SPORTS) */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 30px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .card-label { font-size: 1.1rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        .card-val { font-size: 2.8vw; font-weight: 800; }
        .trend-down { color: var(--down); text-shadow: 0 0 10px rgba(255,75,75,0.3); }

        /* FULL SCREEN IFRAME */
        iframe { width: 100%; height: 95%; border-radius: 15px; border: 1px solid var(--border); background: #fff; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="master-container">
        <!-- CONSTANT SIDEBAR -->
        <div class="sidebar">
            <div id="clock">00:00</div>
            <div id="date">THURSDAY, MARCH 5</div>
            
            <div class="sidebar-weather">
                <div class="sidebar-label">Backyard: KINRUSHV6</div>
                <div id="side-temp">58°F</div>
                <div style="color:var(--accent); font-size: 1vw;">PWS SYSTEMS ACTIVE</div>
            </div>
        </div>

        <div class="content-area">
            <!-- PAGE 0: MICHAEL'S SPLASH -->
            <div id="page-0" class="page active">
                <div class="title-text">Michael's prototype <br> <span style="font-weight: 800; font-size: 5.5vw; color: var(--accent);">Weather Page</span></div>
            </div>

            <!-- PAGE 1: SPORTS -->
            <div id="page-1" class="page">
                <div class="sidebar-label" style="color: var(--accent); margin-bottom: 20px;">NCAA Men's Hoops</div>
                <div id="sports-list"></div>
            </div>

            <!-- PAGE 2: GLASSMORPH STOCKS -->
            <div id="page-2" class="page">
                <div class="sidebar-label" style="color: var(--accent); margin-bottom: 20px;">Closing Markets: Mar 5, 2026</div>
                <div class="glass-card">
                    <div><div class="card-label">Dow Jones</div><div class="card-val">47,954.74</div></div>
                    <div class="trend-down" style="text-align:right;">▼ 784.67<br><small style="font-size:1.5rem">-1.61%</small></div>
                </div>
                <div class="glass-card">
                    <div><div class="card-label">S&P 500</div><div class="card-val">6,830.71</div></div>
                    <div class="trend-down" style="text-align:right;">▼ 38.79<br><small style="font-size:1.5rem">-0.56%</small></div>
                </div>
                <div class="glass-card">
                    <div><div class="card-label">NASDAQ</div><div class="card-val">22,748.99</div></div>
                    <div class="trend-down" style="text-align:right;">▼ 58.50<br><small style="font-size:1.5rem">-0.26%</small></div>
                </div>
            </div>

            <!-- PAGE 3: WEATHER DASHBOARD -->
            <div id="page-3" class="page">
                <iframe src="https://www.wunderground.com"></iframe>
            </div>
        </div>
    </div>

    <script>
        let idx = 0;
        const totalPages = 4;

        // --- ROTATION (8 SECONDS) ---
        function rotate() {
            document.getElementById(`page-${idx}`).classList.remove('active');
            idx = (idx + 1) % totalPages;
            document.getElementById(`page-${idx}`).classList.add('active');
            
            // Sync background with random image
            document.getElementById('bg-layer').style.backgroundImage = `url('https://picsum.photos{Math.random()}')`;
        }
        setInterval(rotate, 8000);

        // --- SPORTS FETCH (CORS PROXY FIX) ---
        async function updateSports() {
            try {
                const target = 'https://site.api.espn.com';
                const proxy = `https://api.allorigins.win{encodeURIComponent(target)}`;
                const res = await fetch(proxy);
                const raw = await res.json();
                const data = JSON.parse(raw.contents);
                let html = "";
                
                data.events.slice(0, 4).forEach(e => {
                    const teams = e.competitions[0].competitors;
                    const home = teams.find(t => t.homeAway === 'home');
                    const away = teams.find(t => t.homeAway === 'away');
                    const status = e.status.type.shortDetail;
                    
                    html += `
                        <div class="glass-card" style="padding: 20px;">
                            <div style="font-size: 2vw; font-weight: 700;">${away.team.abbreviation} @ ${home.team.abbreviation}</div>
                            <div style="text-align:right">
                                <div style="font-size: 2.2vw; font-weight: 800; color: var(--accent);">${away.score} - ${home.score}</div>
                                <div style="font-size: 0.9vw; color: #888; text-transform: uppercase;">${status}</div>
                            </div>
                        </div>`;
                });
                document.getElementById('sports-list').innerHTML = html || "No Live Games";
            } catch(e) { document.getElementById('sports-list').innerHTML = "Syncing Scores..."; }
        }

        // --- CLOCK ENGINE ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).replace(/ AM| PM/, "");
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
        }

        setInterval(updateClock, 1000);
        setInterval(updateSports, 60000);
        
        // Init
        updateClock();
        updateSports();
        document.getElementById('bg-layer').style.backgroundImage = "url('https://picsum.photos')";
    </script>
</body>
</html>
