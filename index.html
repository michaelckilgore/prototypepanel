<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KINRUSHV6 Master Command Center</title>
    <style>
        :root { --accent: #00ffcc; --emergency: #ff0000; --clutch-y: #ffcc00; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }
        iframe { width: 100%; height: 100%; border: none; }
        .verification-img { width: 100%; height: 100%; object-fit: cover; }
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; width: 90%; }
        .game-card { padding: 20px; border-radius: 15px; background: #111; border: 3px solid #333; font-size: 2rem; }
        .clutch-y { background: var(--clutch-y) !important; color: #000 !important; border-color: #fff; }
        .clutch-r { background: var(--emergency) !important; color: #fff !important; animation: pulse 0.5s infinite; border-color: #fff; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        #clock { position: fixed; top: 20px; right: 20px; font-size: 3rem; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 15px; z-index: 1000; border: 1px solid #333; }
        #alert-bar { background: #ff4500; color: #fff; padding: 15px; font-size: 2rem; position: fixed; bottom: 0; width: 100%; text-align: center; display: none; font-weight: bold; z-index: 2000; }
    </style>
</head>
<body onclick="unmuteAudio()">
    <div id="clock">00:00</div>
    <div id="alert-bar">ALERT DETECTED</div>

    <!-- PAGE 0: KINRUSHV6 WEATHER -->
    <div id="page-0" class="page active">
        <iframe src="https://www.wunderground.com"></iframe>
    </div>

    <!-- PAGE 1: SPORTS (CLUTCH-AWARE) -->
    <div id="page-1" class="page">
        <h1 style="color:var(--clutch-y); font-size: 3rem; margin-bottom: 10px;">TODAY'S SPORTS</h1>
        <div id="score-grid" class="card-grid">Loading Games...</div>
    </div>

    <!-- PAGE 2: VERIFICATION IMAGE -->
    <div id="page-2" class="page">
        <img src="https://picsum.photos" class="verification-img">
    </div>

    <!-- PAGE 3: HOUSE LOGIC (TRASH/POWER) -->
    <div id="page-3" class="page">
        <h1 style="color:var(--accent); font-size: 4rem;">HOUSE MONITOR</h1>
        <div id="power-status" style="font-size: 2.5rem; margin-bottom: 20px;">Checking Grid...</div>
        <div id="trash-reminder" style="font-size: 2.5rem; color:#aaa;"></div>
    </div>

    <script>
        const WU_KEY = 'c81a6f3f2fe543bd9a6f3f2fe583bde7';
        const RUSH_ZONE = 'INZ066'; 
        let currentIndex = 0;
        const totalPages = 4;

        // --- 1. RAPID ROTATION (3 SECONDS) ---
        function rotate() {
            document.getElementById(`page-${currentIndex}`).classList.remove('active');
            currentIndex = (currentIndex + 1) % totalPages;
            const nextSlot = document.getElementById(`page-${currentIndex}`);
            nextSlot.classList.add('active');
            if (currentIndex === 2) nextSlot.querySelector('img').src = `https://picsum.photos{Math.random()}`;
        }
        setInterval(rotate, 3000);

        // --- 2. NWS ALERTS (INDIANA + RUSH LOCAL) ---
        async function updateAlerts() {
            try {
                const res = await fetch('https://api.weather.gov');
                const data = await res.json();
                const now = new Date();
                const bar = document.getElementById('alert-bar');
                
                let localAlert = data.features.find(f => f.properties.affectedZones.includes(`https://api.weather.gov{RUSH_ZONE}`));
                let statewideWatch = data.features.find(f => f.properties.event === "Tornado Watch" && (now - new Date(f.properties.sent)) < 3600000);

                if (localAlert || statewideWatch) {
                    const alertText = localAlert ? `LOCAL: ${localAlert.properties.event}` : `STATE: ${statewideWatch.properties.event}`;
                    bar.innerText = alertText;
                    bar.style.display = "block";
                } else {
                    bar.style.display = "none";
                }
            } catch(e) {}
        }

        // --- 3. SPORTS (NCAA + NFL CLUTCH) ---
        async function updateSports() {
            try {
                const res = await fetch('https://site.api.espn.com');
                const data = await res.json();
                let html = "";
                data.events.slice(0, 4).forEach(e => {
                    const game = e.competitions[0];
                    const teamA = game.competitors[0];
                    const teamB = game.competitors[1];
                    const diff = Math.abs(teamA.score - teamB.score);
                    const clock = e.status.displayClock;
                    let clutch = "";
                    if (diff <= 3 && clock <= "0:20") clutch = "clutch-r";
                    else if (diff <= 5 && clock <= "1:00") clutch = "clutch-y";
                    html += `<div class="game-card ${clutch}">${teamA.team.abbreviation} ${teamA.score} - ${teamB.team.abbreviation} ${teamB.score}<br><small>${e.status.type.shortDetail}</small></div>`;
                });
                document.getElementById('score-grid').innerHTML = html;
            } catch(e) {}
        }

        // --- 4. HOUSE LOGIC (TRASH + POWER) ---
        function updateHouse() {
            const now = new Date();
            const day = now.getDay();
            const holidays = ["2026-01-01", "2026-05-25", "2026-09-07"]; // Simplified holiday check
            let trashDay = (day === 2) ? "🗑️ TRASH OUT TONIGHT" : "Trash Day: Wednesday";
            document.getElementById('trash-reminder').innerText = trashDay;
            document.getElementById('power-status').innerText = "GRID STATUS: RUSH COUNTY NORMAL (0 OUTAGES)";
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        updateAlerts(); updateSports(); updateHouse();
        setInterval(updateAlerts, 60000); setInterval(updateSports, 60000);
    </script>
</body>
</html>
