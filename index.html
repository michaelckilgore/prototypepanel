<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KINRUSHV6 Master Command Center</title>
    <style>
        :root { --accent: #00ffcc; --emergency: #ff0000; --clutch-y: #ffcc00; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; }
        
        /* PAGE SYSTEM */
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }

        /* THEMES & OVERLAYS */
        #dimmer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; pointer-events: none; z-index: 1000; opacity: 0; transition: opacity 5s; }
        .emergency-mode { background: var(--emergency) !important; animation: strobe 0.5s infinite; color: #fff !important; }
        @keyframes strobe { 0% { background: #f00; } 50% { background: #600; } }

        /* WEATHER IFRAME */
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* SPORTS GRID */
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px; width: 90%; }
        .game-card { padding: 30px; border-radius: 20px; background: #111; border: 4px solid #333; font-size: 2.5rem; }
        .clutch-y { background: var(--clutch-y) !important; color: #000 !important; border-color: #fff; }
        .clutch-r { background: var(--emergency) !important; color: #fff !important; border-color: #fff; animation: pulse 0.6s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }

        /* MISC */
        #clock { position: fixed; top: 20px; right: 20px; font-size: 3rem; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 15px; z-index: 1000; border: 1px solid #333; }
        #alert-bar { background: #ff4500; color: #fff; padding: 20px; font-size: 2.5rem; position: fixed; bottom: 0; width: 100%; text-align: center; display: none; font-weight: bold; z-index: 2000; }
        .verification-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onclick="unmuteAudio()">
    <div id="dimmer"></div>
    <div id="clock">00:00</div>
    <div id="alert-bar">FLOOD WARNING: RUSH COUNTY</div>

    <!-- PAGE 0: WEATHER UNDERGROUND -->
    <div id="page-0" class="page active">
        <iframe src="https://www.wunderground.com"></iframe>
    </div>

    <!-- PAGE 1: SPORTS (NCAA/NFL) -->
    <div id="page-1" class="page">
        <h1 style="color:var(--clutch-y); font-size: 4rem; margin-bottom: 20px;">TONIGHT'S HOOPS</h1>
        <div id="score-grid" class="card-grid">Syncing ESPN Data...</div>
    </div>

    <!-- PAGE 2: VERIFICATION IMAGE -->
    <div id="page-2" class="page">
        <img id="test-img" src="https://picsum.photos" class="verification-img">
    </div>

    <!-- PAGE 3: HOUSE MONITOR -->
    <div id="page-3" class="page">
        <h1 style="color:var(--accent); font-size: 4rem;">HOUSE MONITOR</h1>
        <div id="power-status" style="font-size: 3rem; margin-bottom: 20px;">GRID: NORMAL (0 OUTAGES)</div>
        <div id="trash-reminder" style="font-size: 3rem; color:#aaa;">Trash Day: Wednesday</div>
    </div>

    <script>
        const RUSH_ZONE = 'INZ066';
        let currentIndex = 0;
        const totalPages = 4;

        // --- 3-SECOND ROTATION ---
        function rotate() {
            document.getElementById(`page-${currentIndex}`).classList.remove('active');
            currentIndex = (currentIndex + 1) % totalPages;
            document.getElementById(`page-${currentIndex}`).classList.add('active');
            if (currentIndex === 2) {
                document.getElementById('test-img').src = `https://picsum.photos{Math.random()}`;
            }
        }
        setInterval(rotate, 3000);

        // --- PROXY-POWERED SPORTS (NCAA/NFL) ---
        async function updateSports() {
            try {
                // Using AllOrigins Proxy to bypass LG CX CORS issues
                const target = 'https://site.api.espn.com';
                const proxy = `https://api.allorigins.win{encodeURIComponent(target)}`;
                
                const res = await fetch(proxy);
                const raw = await res.json();
                const data = JSON.parse(raw.contents); // Unwrapping the proxy content
                let html = "";
                
                // Show today's games (Mar 5, 2026)
                data.events.slice(0, 4).forEach(e => {
                    const game = e.competitions[0];
                    const away = game.competitors.find(c => c.homeAway === 'away');
                    const home = game.competitors.find(c => c.homeAway === 'home');
                    const scoreA = parseInt(away.score);
                    const scoreB = parseInt(home.score);
                    const diff = Math.abs(scoreA - scoreB);
                    const clock = e.status.displayClock;
                    
                    let clutch = "";
                    if (e.status.type.state === 'in-progress') {
                        if (diff <= 3 && clock <= "0:20") clutch = "clutch-r";
                        else if (diff <= 5 && clock <= "1:00") clutch = "clutch-y";
                    }

                    html += `<div class="game-card ${clutch}">
                        ${away.team.abbreviation} ${scoreA} @ ${home.team.abbreviation} ${scoreB}<br>
                        <small style="font-size:1.5rem; color:#aaa;">${e.status.type.shortDetail}</small>
                    </div>`;
                });
                document.getElementById('score-grid').innerHTML = html || "No Games Found";
            } catch(e) { 
                document.getElementById('score-grid').innerText = "Network Error - Retrying..."; 
            }
        }

        // --- HOUSE LOGIC (TRASH/DIM) ---
        function runHouseLogic() {
            const now = new Date();
            const hr = now.getHours();
            const day = now.getDay();
            const dim = document.getElementById('dimmer');
            
            // 3-Tier Dimmer
            if (hr >= 23 || hr < 8) { dim.style.opacity = 0.9; document.body.style.color = "#800"; }
            else if (hr >= 19) { dim.style.opacity = 0.5; document.body.style.color = "#fff"; }
            else { dim.style.opacity = 0; document.body.style.color = "#fff"; }

            // Trash Reminder (Wed Pickup)
            document.getElementById('trash-reminder').innerText = (day === 2) ? "🗑️ TRASH OUT TONIGHT" : "Trash Day: Wednesday";
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Initial Run
        updateSports();
        runHouseLogic();
        setInterval(updateSports, 60000);
        setInterval(runHouseLogic, 60000);
    </script>
</body>
</html>
