<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rushville Weather Prototype</title>
<style>
/* Fonts */
@import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');

/* Body & background gradient like sample */
body {
  margin:0;
  font-family: 'Roboto Condensed', sans-serif;
  background: linear-gradient(to bottom, #0b0b0b, #1a1a1a);
  color:#fff;
  overflow:hidden;
}

/* Watermark */
.watermark {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size:80px;
  color: rgba(255,255,255,0.08);
  pointer-events:none;
  white-space:nowrap;
  z-index:1000;
  font-weight:bold;
  letter-spacing:10px;
}

/* Alert banner */
.alert {
  position:absolute;
  top:0;
  width:100%;
  background:#d32f2f;
  text-align:center;
  padding:12px;
  font-size:28px;
  font-weight:bold;
  z-index:10;
  letter-spacing:1px;
}

/* Main weather container */
.weather-container {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  padding-top:100px;
  opacity:1;
  transition:opacity 0.5s;
}

/* Title */
.title {
  font-size:48px;
  font-weight:bold;
  margin-bottom:30px;
  letter-spacing:1px;
}

/* Panels container */
.panel-container {
  display:flex;
  gap:30px;
  justify-content:center;
  margin-top:30px;
}

/* Panel styles */
.panel {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:30px 50px;
  min-width:220px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  font-size:24px;
}

/* Temperature */
.bigtemp {
  font-size:120px;
  font-weight:bold;
  margin-bottom:20px;
}

/* Weather icon */
.weather-icon {
  width:140px;
  height:140px;
  margin-bottom:20px;
}

/* Ticker */
.ticker {
  position:absolute;
  bottom:0;
  width:100%;
  background:#111;
  padding:12px;
  font-size:22px;
  white-space:nowrap;
  letter-spacing:1px;
}
</style>
</head>
<body>

<div class="watermark">Sample Data Only</div>

<div class="alert" id="alertBanner">⚠️ Severe Thunderstorm Watch until 9:00 PM ⚠️</div>

<div class="weather-container">
  <div class="title">Rushville Weather</div>
  <img id="weatherIcon" class="weather-icon" src="">
  <div class="bigtemp" id="temp">--°</div>
  <div class="panel-container">
    <div class="panel">Humidity<br><span id="humidity">--</span>%</div>
    <div class="panel">Wind<br><span id="wind">--</span> mph</div>
    <div class="panel">Pressure<br><span id="pressure">--</span></div>
  </div>
</div>

<div class="ticker" id="ticker">Loading weather data...</div>

<script>
// --- Weather icons URLs (high-res) ---
const weatherIcons = {
  sun:"https://i.imgur.com/1Xo5LzL.png",
  cloud:"https://i.imgur.com/6P0vT2c.png",
  storm:"https://i.imgur.com/3H9gZVl.png"
};

// --- Generate fake weather data ---
function getFakeWeather(){
  const types=["sun","cloud","storm"];
  const type=types[Math.floor(Math.random()*types.length)];
  return {
    temp:Math.floor(Math.random()*20)+60,
    humidity:Math.floor(Math.random()*50)+30,
    wind:Math.floor(Math.random()*15)+5,
    pressure:(Math.random()*2+29).toFixed(2),
    icon:type
  };
}

// --- Update UI ---
function updateWeather(){
  const w=getFakeWeather();
  document.getElementById("temp").innerText=w.temp+"°";
  document.getElementById("humidity").innerText=w.humidity;
  document.getElementById("wind").innerText=w.wind;
  document.getElementById("pressure").innerText=w.pressure;
  document.getElementById("weatherIcon").src=weatherIcons[w.icon];
  document.getElementById("ticker").innerText=`⚠️ Severe Thunderstorm Watch ⚠️ | Temp ${w.temp}° | Wind ${w.wind} mph | Humidity ${w.humidity}% | Pressure ${w.pressure}`;
}

// Initial load and auto-update every 5 seconds
updateWeather();
setInterval(updateWeather,5000);

// --- Pixel drift for anti-burn-in ---
setInterval(()=>{
  let x=Math.floor(Math.random()*8)-4;
  let y=Math.floor(Math.random()*8)-4;
  document.body.style.transform=`translate(${x}px,${y}px)`;
},180000);
</script>
</body>
</html>
