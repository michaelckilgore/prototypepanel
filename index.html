<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Michael's Command - RED ALERT MODE</title>
    <style>
        :root { --panel-bg: rgba(5, 5, 10, 0.98); --accent: #00f2ff; --alert: #ff6600; --red: #ff0000; --border: rgba(0, 242, 255, 0.2); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* GLOBAL FLOOD BAR */
        #global-alert { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: var(--alert); color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 1.8vw; text-transform: uppercase; z-index: 9999; border-bottom: 4px solid #fff; }

        .master-container { display: flex; height: calc(100vh - 60px); width: 100vw; margin-top: 60px; }
        
        /* SIDEBAR */
        .sidebar { width: 30%; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 25px; box-sizing: border-box; }
        #clock { font-size: 6vw; font-weight: 900; line-height: 1; }
        #side-temp { font-size: 8vw; font-weight: 800; color: var(--accent); margin-top: 20px; }
        .met-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .met-val { font-size: 1.5vw; font-weight: 600; }

        /* CONTENT */
        .content-area { width: 70%; position: relative; padding: 40px; box-sizing: border-box; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; }
        .active { display: flex; }

        /* CLUTCH CARDS */
        .clutch-card { background: var(--red); color: #fff; padding: 40px; border-radius: 20px; text-align: center; border: 8px solid #fff; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .team-lg { font-size: 4vw; font-weight: 900; }
        .score-lg { font-size: 7vw; font-weight: 900; }
    </style>
</head>
<body>

    <div id="global-alert">FLOOD WARNING: RUSH COUNTY (46173) UNTIL 4:00 AM</div>

    <div class="master-container">
        <div class="sidebar">
            <div id="clock">09:15</div>
            <div id="side-temp">51.8°</div>
            <div class="met-grid">
                <div class="met-item"><span style="color:#666; font-size:0.8vw">Wind</span><br><span class="met-val">6 MPH SW</span></div>
                <div class="met-item"><span style="color:#666; font-size:0.8vw">Humidity</span><br><span class="met-val">94%</span></div>
                <div class="met-item"><span style="color:#666; font-size:0.8vw">Pressure</span><br><span class="met-val">29.88 IN</span></div>
                <div class="met-item"><span style="color:#666; font-size:0.8vw">Dew Point</span><br><span class="met-val">50.1°</span></div>
            </div>
        </div>

        <div class="content-area">
            <!-- OVERRIDE: CLUTCH RED ALERT -->
            <div id="page-0" class="page active">
                <div class="clutch-card">
                    <div style="font-size: 1.5vw; letter-spacing: 5px; font-weight: 800;">GLOBAL RED ALERT</div>
                    <div class="team-lg">MICHIGAN @ IOWA</div>
                    <div class="score-lg">78 - 77</div>
                    <div style="font-size: 2vw; font-weight: 800;">2nd Half - 1:12</div>
                </div>
            </div>
            <!-- MARKET RECAP -->
            <div id="page-1" class="page">
                <h1 style="color:var(--accent); font-size: 3vw;">MARKET CLOSE (MARCH 5)</h1>
                <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:15px; border:1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:2vw;">
                        <span>DOW JONES</span><span style="color:#ff3333">▼ 47,954.74 (-1.61%)</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:2vw;">
                        <span>S&P 500</span><span style="color:#ff3333">▼ 6,830.71 (-0.56%)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let idx = 0;
        setInterval(() => {
            document.getElementById(`page-${idx}`).classList.remove('active');
            idx = (idx + 1) % 2;
            document.getElementById(`page-${idx}`).classList.add('active');
        }, 10000);

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).replace(/ AM| PM/, "");
        }, 1000);
    </script>
</body>
</html>
