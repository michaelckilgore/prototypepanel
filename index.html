<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Michael's Prototype - Rushville</title>
    <style>
        :root { --panel-bg: rgba(20, 20, 25, 0.85); --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --down: #ff4b4b; --up: #00ff88; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .master-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 25%; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px; backdrop-filter: blur(15px); box-sizing: border-box; }
        #clock { font-size: 5vw; font-weight: 800; letter-spacing: -2px; margin:0; }
        #date { font-size: 1.1vw; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .content-area { width: 75%; position: relative; padding: 60px; box-sizing: border-box; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; animation: fadeIn 0.5s ease; justify-content: center; align-items: center; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* MICHAEL'S CUSTOM PAGE STYLE */
        .title-text { font-size: 5vw; font-weight: 200; letter-spacing: 5px; text-transform: uppercase; text-align: center; border: 2px solid var(--border); padding: 50px; border-radius: 20px; background: var(--glass); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }

        .data-card { width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .val-box { font-size: 2.2vw; font-weight: 800; }
    </style>
</head>
<body>
    <div class="master-container">
        <div class="sidebar">
            <div id="clock">00:00</div>
            <div id="date">MARCH 5, 2026</div>
            <div style="border-top: 1px solid var(--border); padding-top: 30px; margin-top: auto;">
                <div style="font-size: 0.9vw; color: #888; text-transform: uppercase;">Station: KINRUSHV6</div>
                <div id="side-temp" style="font-size: 4vw; font-weight: 700;">58°F</div>
                <div style="color:var(--accent)">SYSTEMS ACTIVE</div>
            </div>
        </div>
        
        <div class="content-area">
            <!-- PAGE 0: MICHAEL'S SPLASH -->
            <div id="page-0" class="page active">
                <div class="title-text">Michael's prototype <br> <span style="font-weight: 800; font-size: 6vw; color: var(--accent);">Weather Page</span></div>
            </div>

            <!-- PAGE 1: SPORTS -->
            <div id="page-1" class="page">
                <div style="color: var(--accent); font-size: 1.5vw; margin-bottom: 20px; align-self: flex-start;">NCAA MEN'S HOOPS</div>
                <div id="sports-list" style="width: 100%;"></div>
            </div>

            <!-- PAGE 2: STOCKS -->
            <div id="page-2" class="page">
                <div style="color: var(--accent); font-size: 1.5vw; margin-bottom: 20px; align-self: flex-start;">MARKET SUMMARY: MAR 5</div>
                <div class="data-card"><div>DOW JONES</div><div class="val-box" style="color:#ff4b4b">47,954.74 (-1.61%)</div></div>
                <div class="data-card"><div>S&P 500</div><div class="val-box" style="color:#ff4b4b">6,830.71 (-0.56%)</div></div>
                <div class="data-card"><div>NASDAQ</div><div class="val-box" style="color:#ff4b4b">22,748.99 (-0.26%)</div></div>
            </div>

            <!-- PAGE 3: LIVE RADAR/PWS -->
            <div id="page-3" class="page">
                <iframe src="https://www.wunderground.com" style="width:100%; height:95%; border-radius:15px; border: 1px solid var(--border); background: #fff;"></iframe>
            </div>
        </div>
    </div>

    <script>
        let idx = 0;
        const totalPages = 4;

        async function updateSports() {
            try {
                const res = await fetch(`https://api.allorigins.win{encodeURIComponent('https://site.api.espn.com')}`);
                const data = JSON.parse((await res.json()).contents);
                let html = "";
                data.events.slice(0, 4).forEach(e => {
                    const teams = e.competitions[0].competitors;
                    const home = teams.find(t => t.homeAway === 'home');
                    const away = teams.find(t => t.homeAway === 'away');
                    html += `<div class="data-card"><div>${away.team.abbreviation} @ ${home.team.abbreviation}</div><div class="val-box" style="color:var(--accent)">${e.status.type.state === 'pre' ? '--' : away.score} - ${e.status.type.state === 'pre' ? '--' : home.score}<div style="font-size:1vw; color:#888; text-align:right">${e.status.type.shortDetail}</div></div></div>`;
                });
                document.getElementById('sports-list').innerHTML = html;
            } catch(e) { console.log("Sports Sync Failed"); }
        }

        function rotate() {
            document.getElementById(`page-${idx}`).classList.remove('active');
            idx = (idx + 1) % totalPages;
            document.getElementById(`page-${idx}`).classList.add('active');
        }

        setInterval(rotate, 8000); 
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).replace(/ AM| PM/, "");
        }, 1000);

        updateSports();
        setInterval(updateSports, 60000);
    </script>
</body>
</html>
