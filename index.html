<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Michael's Prototype - Global Alert Edition</title>
    <style>
        :root {
            --panel-bg: rgba(5, 5, 10, 0.98);
            --accent: #00f2ff;
            --alert: #ff6600; /* Bright Orange for Flood */
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 242, 255, 0.3);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* GLOBAL ALERT RIBBON */
        #global-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: var(--alert); color: #000; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5vw; text-transform: uppercase; z-index: 5000;
            letter-spacing: 2px; display: none; /* Hidden by default, shown by JS */
        }

        .master-container { display: flex; height: calc(100vh - 50px); width: 100vw; margin-top: 50px; }
        
        /* SIDEBAR & CONTENT (Same as before) */
        .sidebar { width: 28%; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 25px; box-sizing: border-box; }
        #clock { font-size: 5vw; font-weight: 900; letter-spacing: -3px; line-height: 1; margin: 0; }
        #date { font-size: 0.9vw; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        .weather-console { border-top: 1px solid var(--border); padding-top: 25px; margin-top: auto; }
        #side-temp { font-size: 6vw; font-weight: 800; margin: 0; }
        .met-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .met-val { font-size: 1.2vw; font-weight: 600; color: #eee; }
        .content-area { width: 72%; position: relative; padding: 60px; box-sizing: border-box; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; }
        .active { display: flex; animation: fadeIn 0.8s ease; }
        iframe { width: 100%; height: 95%; border-radius: 15px; border: 1px solid var(--border); background: white; }
    </style>
</head>
<body>

    <!-- GLOBAL ALERT (Always on Top) -->
    <div id="global-alert">FLOOD WARNING IN EFFECT - RUSH COUNTY</div>

    <div class="master-container">
        <div class="sidebar">
            <div id="clock">00:00</div>
            <div id="date">MARCH 5, 2026</div>
            <div class="weather-console">
                <div id="side-temp">58°</div>
                <div style="color:var(--accent); font-size: 1vw; margin-bottom: 15px;">STATION: KINRUSHV6</div>
                <div class="met-grid">
                    <div class="met-item"><span style="color:#666; font-size:0.7vw;">Wind</span><br><span id="val-wind" class="met-val">-- MPH</span></div>
                    <div class="met-item"><span style="color:#666; font-size:0.7vw;">Hum</span><br><span id="val-hum" class="met-val">--%</span></div>
                    <div class="met-item" style="grid-column: span 2;"><span style="color:#666; font-size:0.7vw;">Barometer</span><br><span id="val-press" class="met-val">-- IN</span></div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div id="page-0" class="page active">
                <div style="border-left: 15px solid var(--accent); padding-left: 40px;">
                    <div style="font-size: 5vw; font-weight: 900; line-height:0.8;">RUSHVILLE<br><span style="color:var(--accent)">COMMAND CENTER</span></div>
                </div>
            </div>
            <div id="page-1" class="page"><div id="sports-list">Syncing NCAA Data...</div></div>
            <div id="page-2" class="page"><iframe src="https://www.wunderground.com"></iframe></div>
        </div>
    </div>

    <script>
        const RUSH_ZONE = 'INZ066'; 
        let pageIdx = 0;

        // --- 1. GLOBAL ALERT FETCHER (NWS) ---
        async function checkAlerts() {
            try {
                const proxy = 'https://api.allorigins.win';
                const target = 'https://api.weather.gov';
                const res = await fetch(proxy + encodeURIComponent(target));
                const json = await res.json();
                const data = JSON.parse(json.contents);
                
                // Search for any warning affecting Rush County Zone (INZ066)
                const rushAlert = data.features.find(f => f.properties.affectedZones.includes(`https://api.weather.gov{RUSH_ZONE}`));
                const banner = document.getElementById('global-alert');
                
                if (rushAlert) {
                    banner.innerText = `${rushAlert.properties.event}: RUSH COUNTY`;
                    banner.style.display = "flex";
                } else {
                    banner.style.display = "none";
                }
            } catch(e) { console.log("Alert Sync Error"); }
        }

        // --- 2. ROTATION ---
        function rotate() {
            document.getElementById(`page-${pageIdx}`).classList.remove('active');
            pageIdx = (pageIdx + 1) % 3;
            document.getElementById(`page-${pageIdx}`).classList.add('active');
        }
        setInterval(rotate, 8000);

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}).replace(/ AM| PM/, "");
        }, 1000);

        checkAlerts();
        setInterval(checkAlerts, 120000); // Check every 2 mins
    </script>
</body>
</html>
