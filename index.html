<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rushville Dashboard</title>
<style>
body{margin:0;background:#000;color:white;font-family:Arial;overflow:hidden;}
.screen{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 1s;}
.screen.active{opacity:1;}
.title{position:absolute;top:20px;font-size:40px;font-weight:bold;}
.bigtemp{font-size:120px;font-weight:bold;}
.row{display:flex;gap:60px;margin-top:40px;font-size:30px;}
.ticker{position:absolute;bottom:0;width:100%;background:#111;padding:10px;font-size:22px;}
.alert{position:absolute;top:0;width:100%;background:red;color:white;font-size:28px;font-weight:bold;text-align:center;padding:10px;display:block;}
</style>
</head>
<body>

<!-- FAKE ALERT -->
<div class="alert" id="alertBanner">⚠️ Severe Thunderstorm Watch in effect until 9:00 PM ⚠️</div>

<!-- WEATHER -->
<div class="screen active" id="weather">
<div class="title">Rushville Weather</div>
<div class="bigtemp" id="temp">--°</div>
<div class="row">
<div>Humidity<br><span id="humidity">--</span>%</div>
<div>Wind<br><span id="wind">--</span> mph</div>
<div>Pressure<br><span id="pressure">--</span></div>
</div>
</div>

<!-- SPORTS -->
<div class="screen" id="sports">
<div class="title">College Basketball Tonight</div>
<div id="sportsGames" style="font-size:30px"></div>
</div>

<!-- STOCKS -->
<div class="screen" id="stocks">
<div class="title">Market Watch</div>
<div class="row">
<div>DJIA<br><span id="djia">--</span></div>
<div>S&P 500<br><span id="sp500">--</span></div>
<div>NASDAQ<br><span id="nasdaq">--</span></div>
</div>
</div>

<div class="ticker" id="ticker">Loading data...</div>

<script>
// --- Rotate screens every 3 seconds ---
let screens = document.querySelectorAll(".screen");
let current = 0;
function rotate() {
  screens.forEach(s => s.classList.remove("active"));
  screens[current].classList.add("active");
  current++;
  if(current >= screens.length) current = 0;
}
setInterval(rotate, 3000);

// --- Generate fake weather ---
function getFakeWeather() {
  return {
    temp: Math.floor(Math.random()*20)+60, // 60–79°F
    humidity: Math.floor(Math.random()*50)+30, // 30–79%
    wind: Math.floor(Math.random()*15)+5, // 5–19 mph
    pressure: (Math.random()*2+29).toFixed(2) // 29–31 inHg
  };
}

// --- Generate fake stocks ---
function getFakeStocks() {
  return {
    djia: 38700 + Math.floor(Math.random()*200),
    sp500: 5100 + Math.floor(Math.random()*50),
    nasdaq: 16000 + Math.floor(Math.random()*200)
  };
}

// --- Generate fake sports scores ---
function getFakeSports() {
  const games = [
    {game:"Michigan @ Iowa", time:"8:00 PM", score:`${Math.floor(Math.random()*30)+50}-${Math.floor(Math.random()*30)+50}`},
    {game:"Rutgers @ Michigan State", time:"8:00 PM", score:`${Math.floor(Math.random()*30)+50}-${Math.floor(Math.random()*30)+50}`},
    {game:"Duke @ UNC", time:"9:00 PM", score:`${Math.floor(Math.random()*30)+50}-${Math.floor(Math.random()*30)+50}`}
  ];
  return games;
}

// --- Update WEATHER ---
function updateWeather() {
  const weather = getFakeWeather();
  document.getElementById("temp").innerText = weather.temp + "°";
  document.getElementById("humidity").innerText = weather.humidity;
  document.getElementById("wind").innerText = weather.wind;
  document.getElementById("pressure").innerText = weather.pressure;
  document.getElementById("ticker").innerText =
    `⚠️ Severe Thunderstorm Watch ⚠️ | Temp ${weather.temp}° | Wind ${weather.wind} mph | Humidity ${weather.humidity}% | Pressure ${weather.pressure}`;
}
updateWeather();
setInterval(updateWeather, 5000);

// --- Update STOCKS ---
function updateStocks() {
  const stocks = getFakeStocks();
  document.getElementById("djia").innerText = stocks.djia;
  document.getElementById("sp500").innerText = stocks.sp500;
  document.getElementById("nasdaq").innerText = stocks.nasdaq;
}
updateStocks();
setInterval(updateStocks, 5000);

// --- Update SPORTS ---
function updateSports() {
  const sports = getFakeSports();
  document.getElementById("sportsGames").innerHTML =
    sports.map(g => `${g.game} – ${g.time} – Score: ${g.score}`).join("<br>");
}
updateSports();
setInterval(updateSports, 5000);

// --- Anti-burn-in pixel drift every 3 minutes ---
setInterval(() => {
  let x = Math.floor(Math.random() * 8) - 4;
  let y = Math.floor(Math.random() * 8) - 4;
  document.body.style.transform = `translate(${x}px,${y}px)`;
}, 180000);

</script>
</body>
</html>
