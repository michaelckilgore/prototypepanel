<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KINRUSHV6 Master Prototype</title>
    <style>
        :root { --accent: #00ffcc; --clutch-y: #ffcc00; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }
        
        /* WEATHER DASHBOARD FIX */
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        
        /* SPORTS LAYOUT */
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; width: 90%; }
        .game-card { padding: 25px; border-radius: 15px; background: #111; border: 3px solid #333; font-size: 2.2rem; }
        
        #clock { position: fixed; top: 20px; right: 20px; font-size: 3rem; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 15px; z-index: 1000; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="clock">00:00</div>

    <!-- PAGE 0: KINRUSHV6 DASHBOARD (Fixed URL) -->
    <div id="page-0" class="page active">
        <!-- Using the 'pwsdash' parameter to force the dashboard view -->
        <iframe src="https://www.wunderground.com"></iframe>
    </div>

    <!-- PAGE 1: SPORTS (Double-Proxy Fix) -->
    <div id="page-1" class="page">
        <h1 style="color:var(--clutch-y); font-size: 3.5rem;">TONIGHT'S HOOPS</h1>
        <div id="score-grid" class="card-grid">Syncing ESPN...</div>
    </div>

    <!-- PAGE 2: VERIFICATION IMAGE -->
    <div id="page-2" class="page">
        <img id="test-img" src="https://picsum.photos" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <!-- PAGE 3: HOUSE MONITOR -->
    <div id="page-3" class="page">
        <h1 style="color:var(--accent); font-size: 4rem;">HOUSE MONITOR</h1>
        <div id="power-status" style="font-size: 3rem; margin-bottom: 20px;">GRID: NORMAL (0 OUTAGES)</div>
        <div id="trash-reminder" style="font-size: 3rem; color:#aaa;">Trash Day: Wednesday</div>
    </div>

    <script>
        let currentIndex = 0;
        const totalPages = 4;

        // 3-SECOND ROTATION
        function rotate() {
            document.getElementById(`page-${currentIndex}`).classList.remove('active');
            currentIndex = (currentIndex + 1) % totalPages;
            document.getElementById(`page-${currentIndex}`).classList.add('active');
            if (currentIndex === 2) {
                document.getElementById('test-img').src = `https://picsum.photos{Math.random()}`;
            }
        }
        setInterval(rotate, 3000);

        // SPORTS FETCH WITH LG-COMPATIBLE PROXY
        async function updateSports() {
            try {
                // 'allorigins' is more compatible with LG browsers for nested JSON
                const target = 'https://site.api.espn.com';
                const res = await fetch(`https://api.allorigins.win{encodeURIComponent(target)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents); // Unpack the string contents
                
                let html = "";
                data.events.slice(0, 4).forEach(e => {
                    const game = e.competitions[0];
                    const teams = game.competitors;
                    const away = teams.find(t => t.homeAway === 'away');
                    const home = teams.find(t => t.homeAway === 'home');
                    const status = e.status.type.shortDetail;
                    html += `<div class="game-card">
                        ${away.team.abbreviation} @ ${home.team.abbreviation}<br>
                        <span style="color:#aaa; font-size:1.8rem;">${status}</span>
                    </div>`;
                });
                document.getElementById('score-grid').innerHTML = html || "No Games Found";
            } catch(e) { 
                document.getElementById('score-grid').innerText = "Retrying Connection..."; 
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Initial Run
        updateSports();
        setInterval(updateSports, 60000);
    </script>
</body>
</html>
